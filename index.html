<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F2FB;
    --card:#FBFAFE;
    --accent:#9B8AC4;
    --accent-soft:#C9BCE8;
    --mint:#7FC8A9;
    --text-main:#4A4458;
    --text-muted:#A39CB8;
    --disabled-bg:#EAE7F2;
    --shadow-dark: rgba(155,141,178,0.35);
    --shadow-light: rgba(255,255,255,0.95);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Gowun Dodum', sans-serif;
    color:var(--text-main);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    padding:28px 20px 40px;
    position:relative;
  }
  header{ margin-bottom:24px; }
  .eyebrow{
    font-family:'Jua', sans-serif;
    font-size:13px;
    color:var(--accent);
    letter-spacing:0.5px;
  }
  h1{
    font-family:'Jua', sans-serif;
    font-size:26px;
    margin:6px 0 4px;
    font-weight:400;
  }
  .sub{
    font-size:14px;
    color:var(--text-muted);
    margin:0;
  }

  .calendar{
    background:var(--card);
    border-radius:20px;
    padding:18px 16px;
    box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
  }
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .cal-header .month-label{
    font-family:'Jua', sans-serif;
    font-size:16px;
  }
  .cal-nav{
    width:34px; height:34px;
    border-radius:50%;
    border:none;
    background:var(--bg);
    color:var(--text-main);
    font-size:16px;
    cursor:pointer;
    box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
  }
  .cal-nav:active{
    box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
  }
  .cal-weekdays, .cal-grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    text-align:center;
  }
  .cal-weekdays div{
    font-size:12px;
    color:var(--text-muted);
    padding-bottom:8px;
  }
  .cal-grid{
    row-gap:4px;
  }
  .cal-grid div.cell{
    display:flex;
    align-items:center;
    justify-content:center;
    height:38px;
  }
  .day-btn{
    width:34px; height:34px;
    border-radius:12px;
    border:none;
    background:transparent;
    font-family:'Gowun Dodum', sans-serif;
    font-size:13px;
    color:var(--text-main);
    cursor:pointer;
    transition: all .15s ease;
  }
  .day-btn.selectable:hover{
    background:var(--bg);
  }
  .day-btn.selectable:active{
    box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
  }
  .day-btn.today{
    border:1.5px solid var(--accent-soft);
  }
  .day-btn.selected{
    background:var(--accent);
    color:#fff;
    box-shadow: 3px 3px 7px var(--shadow-dark);
  }
  .day-btn.disabled{
    color:var(--text-muted);
    opacity:0.4;
    cursor:not-allowed;
  }

  .section-label{
    font-size:13px;
    color:var(--text-muted);
    margin:18px 2px 10px;
  }

  .time-grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .time-chip{
    flex:0 0 calc(25% - 8px);
    padding:12px 0;
    text-align:center;
    border-radius:14px;
    font-size:14px;
    border:none;
    background:var(--card);
    color:var(--text-main);
    box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    cursor:pointer;
    transition: all .15s ease;
  }
  .time-chip:active{
    box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
  }
  .time-chip.disabled{
    background:var(--disabled-bg);
    color:var(--text-muted);
    box-shadow:none;
    cursor:not-allowed;
    opacity:0.7;
  }

  .empty-msg{
    font-size:14px;
    color:var(--text-muted);
    padding:30px 4px;
    text-align:center;
  }

  .overlay{
    position:fixed; inset:0;
    background:rgba(74,68,88,0.35);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:10;
  }
  .overlay.open{ display:flex; }
  .sheet{
    width:100%;
    max-width:480px;
    background:var(--card);
    border-radius:24px 24px 0 0;
    padding:24px 22px 28px;
    box-shadow: 0 -8px 20px rgba(74,68,88,0.2);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp{
    from{ transform:translateY(100%); }
    to{ transform:translateY(0); }
  }
  .sheet h2{
    font-family:'Jua', sans-serif;
    font-size:19px;
    font-weight:400;
    margin:0 0 4px;
  }
  .sheet .picked{
    font-size:13px;
    color:var(--accent);
    margin-bottom:18px;
  }
  .sheet .notice{
    font-size:12px;
    color:var(--text-muted);
    background:var(--bg);
    border-radius:12px;
    padding:10px 12px;
    margin:0 0 16px;
    line-height:1.5;
  }
  label{
    display:block;
    font-size:13px;
    color:var(--text-muted);
    margin:14px 0 6px;
  }
  input, textarea{
    width:100%;
    padding:12px 14px;
    border:none;
    border-radius:14px;
    background:var(--bg);
    font-family:'Gowun Dodum', sans-serif;
    font-size:14px;
    color:var(--text-main);
    box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
  }
  textarea{ min-height:70px; resize:vertical; }
  input:focus, textarea:focus{ outline:2px solid var(--accent-soft); }

  .btn-row{
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  button.primary, button.ghost{
    flex:1;
    padding:14px 0;
    border-radius:16px;
    border:none;
    font-family:'Gowun Dodum', sans-serif;
    font-size:15px;
    cursor:pointer;
  }
  button.ghost{
    background:var(--bg);
    color:var(--text-muted);
  }
  button.primary{
    background:var(--accent);
    color:#fff;
    box-shadow: 4px 4px 10px var(--shadow-dark);
    transition: transform .1s ease;
  }
  button.primary:active{ transform:scale(0.97); }
  button.primary:disabled{ opacity:0.6; cursor:not-allowed; }

  .toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--mint);
    color:#fff;
    padding:12px 22px;
    border-radius:16px;
    font-size:14px;
    opacity:0;
    transition: all .25s ease;
    z-index:20;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">상담 신청</div>
    <h1>염승희 선생님과 상담 시간 잡기</h1>
    <p class="sub">평일 08:00 ~ 16:00 사이, 비어있는 시간을 골라 신청하세요.</p>
  </header>

  <div class="calendar">
    <div class="cal-header">
      <button class="cal-nav" id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="cal-nav" id="nextMonth">›</button>
    </div>
    <div class="cal-weekdays">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="section-label" id="timeLabel">날짜를 먼저 선택하세요</div>
  <div id="timeGrid" class="time-grid"></div>
</div>

<div id="overlay" class="overlay">
  <div class="sheet">
    <h2>상담 신청</h2>
    <div class="picked" id="pickedInfo"></div>
    <p class="notice">실명으로 작성해주세요. 허위 작성이나 부적절한 내용은 확인 후 별도로 안내될 수 있어요.</p>

    <label for="studentId">학번</label>
    <input id="studentId" type="text" inputmode="numeric" placeholder="예: 20413">

    <label for="studentName">이름</label>
    <input id="studentName" type="text" placeholder="예: 김민지">

    <label for="purpose">상담 목적</label>
    <textarea id="purpose" placeholder="어떤 이야기를 나누고 싶은지 간단히 적어주세요"></textarea>

    <div class="btn-row">
      <button class="ghost" id="cancelBtn">취소</button>
      <button class="primary" id="submitBtn">신청하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ⚠️ Apps Script 배포 후 발급된 웹앱 URL을 여기에 붙여넣으세요.
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaSJApCT9-I9Xkm3wOei_tGSxuBYbuczVxK-B0IdiE8mHvX_zS1EggbL5lJ0TBgRqRfQ/exec';

  let viewYear, viewMonth;
  let selectedDate = null;
  let selectedTime = null;
  let currentSlots = [];

  const today = new Date();
  today.setHours(0,0,0,0);
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();

  const monthLabelEl = document.getElementById('monthLabel');
  const calGridEl = document.getElementById('calGrid');
  const timeGridEl = document.getElementById('timeGrid');
  const timeLabelEl = document.getElementById('timeLabel');
  const overlayEl = document.getElementById('overlay');
  const pickedInfoEl = document.getElementById('pickedInfo');
  const toastEl = document.getElementById('toast');

  function pad(n){ return n < 10 ? '0' + n : '' + n; }
  function toDateStr(y, m, d){ return y + '-' + pad(m+1) + '-' + pad(d); }

  function renderCalendar(){
    monthLabelEl.textContent = viewYear + '년 ' + (viewMonth + 1) + '월';
    calGridEl.innerHTML = '';

    const firstDow = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    for(let i = 0; i < firstDow; i++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      calGridEl.appendChild(cell);
    }

    for(let d = 1; d <= daysInMonth; d++){
      const cell = document.createElement('div');
      cell.className = 'cell';

      const dateObj = new Date(viewYear, viewMonth, d);
      const dow = dateObj.getDay();
      const dateStr = toDateStr(viewYear, viewMonth, d);
      const isPast = dateObj < today;
      const isWeekend = dow === 0 || dow === 6;
      const isToday = dateObj.getTime() === today.getTime();
      const isSelected = dateStr === selectedDate;
      const disabled = isPast || isWeekend;

      const btn = document.createElement('button');
      btn.textContent = d;
      btn.className = 'day-btn' +
        (disabled ? ' disabled' : ' selectable') +
        (isToday ? ' today' : '') +
        (isSelected ? ' selected' : '');

      if(!disabled){
        btn.onclick = () => selectDate(dateStr);
      }else{
        btn.disabled = true;
      }

      cell.appendChild(btn);
      calGridEl.appendChild(cell);
    }
  }

  document.getElementById('prevMonth').onclick = () => {
    viewMonth--;
    if(viewMonth < 0){ viewMonth = 11; viewYear--; }
    renderCalendar();
  };
  document.getElementById('nextMonth').onclick = () => {
    viewMonth++;
    if(viewMonth > 11){ viewMonth = 0; viewYear++; }
    renderCalendar();
  };

  async function selectDate(dateStr){
    selectedDate = dateStr;
    renderCalendar();

    const d = new Date(dateStr + 'T00:00:00');
    const dowNames = ['일','월','화','수','목','금','토'];
    timeLabelEl.textContent = (d.getMonth()+1) + '/' + d.getDate() + '(' + dowNames[d.getDay()] + ') 시간 선택';
    timeGridEl.innerHTML = '<div class="empty-msg">불러오는 중...</div>';

    try{
      const res = await fetch(APPS_SCRIPT_URL + '?action=getSlots&date=' + dateStr);
      const data = await res.json();
      currentSlots = data.slots || [];
      renderTimeGrid();
    }catch(err){
      timeGridEl.innerHTML = '<div class="empty-msg">시간을 불러오지 못했어요. 잠시 후 다시 시도해주세요.</div>';
    }
  }

  function renderTimeGrid(){
    timeGridEl.innerHTML = '';
    if(!currentSlots.length){
      timeGridEl.innerHTML = '<div class="empty-msg">신청 가능한 시간이 없어요.</div>';
      return;
    }
    currentSlots.forEach(slot => {
      const btn = document.createElement('button');
      btn.className = 'time-chip' + (slot.available ? '' : ' disabled');
      btn.textContent = slot.time;
      if(slot.available){
        btn.onclick = () => openSheet(slot.time);
      }else{
        btn.disabled = true;
      }
      timeGridEl.appendChild(btn);
    });
  }

  function openSheet(time){
    selectedTime = time;
    const d = new Date(selectedDate + 'T00:00:00');
    pickedInfoEl.textContent = (d.getMonth()+1) + '/' + d.getDate() + ' ' + time;
    document.getElementById('studentId').value = '';
    document.getElementById('studentName').value = '';
    document.getElementById('purpose').value = '';
    overlayEl.classList.add('open');
  }

  document.getElementById('cancelBtn').onclick = () => overlayEl.classList.remove('open');
  overlayEl.onclick = (e) => { if(e.target === overlayEl) overlayEl.classList.remove('open'); };

  document.getElementById('submitBtn').onclick = async () => {
    const studentId = document.getElementById('studentId').value.trim();
    const name = document.getElementById('studentName').value.trim();
    const purpose = document.getElementById('purpose').value.trim();

    if(!studentId || !name || !purpose){
      showToast('모든 항목을 입력해주세요');
      return;
    }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = '신청 중...';

    try{
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ studentId, name, date: selectedDate, time: selectedTime, purpose })
      });
      const result = await res.json();

      if(result.success){
        overlayEl.classList.remove('open');
        showToast('신청이 완료되었어요!');
        selectDate(selectedDate);
      }else{
        showToast(result.message || '신청에 실패했어요. 다시 시도해주세요.');
      }
    }catch(err){
      showToast('네트워크 오류가 발생했어요.');
    }finally{
      submitBtn.disabled = false;
      submitBtn.textContent = '신청하기';
    }
  };

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  renderCalendar();
</script>
</body>
</html>
